services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quizz-app
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: quizz-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-quizz_app}:${POSTGRES_PASSWORD:-quizz_app_password}@postgres:5432/${POSTGRES_DB:-quizz}"
      RANKING_EXPORT_URL: "${RANKING_EXPORT_URL:-http://henkel-totem.novaxd.com.br:8080/rankings/upload}"
      RANKING_EXPORT_SECRET: "${RANKING_EXPORT_SECRET:-}"
      RANKING_EXPORT_KEY_ID: "${RANKING_EXPORT_KEY_ID:-henkel-quiz-local}"
      RANKING_EXPORT_TIMEOUT_MS: "${RANKING_EXPORT_TIMEOUT_MS:-15000}"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: quizz-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-quizz}"
      POSTGRES_USER: "${POSTGRES_USER:-quizz_app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-quizz_app_password}"
    volumes:
      - quizz_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: quizz-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@henkel.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-admin}"
    volumes:
      - quizz_pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  quizz_postgres_data:
  quizz_pgadmin_data:
