        pergunta: "Qual animal foi símbolo da marca Henkel entre 1895 e 1961, aparecendo nas embalagens e tornando-se uma marca registrada da companhia?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "Leão"
          - "Águia"
          - "Urso"
          - "Gato"
