colecoes:
  - id: ipe-icj
    nome: "IPÊ & ICJ"
    perguntas:
      - id: ipe-icj-001
        pergunta: "Há quantos anos a Henkel está presente no Brasil?"
        nivel: facil
        pontos: 5
        alternativas:
          - "70 anos"
          - "20 anos"
          - "50 anos"
          - "150 anos"
        resposta_correta: "70 anos"
      - id: ipe-icj-002
        pergunta: "Em que ano o Inspiration Center Jundiaí foi oficialmente inaugurado?"
        nivel: facil
        pontos: 5
        alternativas:
          - "2026"
          - "2020"
          - "2022"
          - "2024"
        resposta_correta: "2026"
      - id: ipe-icj-003
        pergunta: "Qual dessas marcas de Henkel Consumer Brands faz parte do portfólio brasileiro?"
        nivel: facil
        pontos: 5
        alternativas:
          - "Schwarzkopf"
          - "Got2be"
          - "Persil"
          - "Purex"
        resposta_correta: "Schwarzkopf"
      - id: ipe-icj-004
        pergunta: "Onde fica a sede da Henkel na Alemanha?"
        nivel: facil
        pontos: 5
        alternativas:
          - "Düsseldorf"
          - "Berlim"
          - "Munique"
          - "Frankfurt"
        resposta_correta: "Düsseldorf"
      - id: ipe-icj-005
        pergunta: "Quem é o fundador da Henkel, cujo espírito pioneiro inspira a empresa há 150 anos?"
        nivel: facil
        pontos: 5
        alternativas:
          - "Fritz Henkel"
          - "Hans Schwarzkopf"
          - "Werner von Siemens"
          - "Carl Bosch"
        resposta_correta: "Fritz Henkel"
      - id: ipe-icj-006
        pergunta: "Qual produto lançado pela Henkel em 1969 foi o primeiro bastão de cola do mundo?"
        nivel: facil
        pontos: 5
        alternativas:
          - "Pritt"
          - "SuperBonder"
          - "Durepoxi"
          - "Cascola"
        resposta_correta: "Pritt"
      - id: ipe-icj-007
        pergunta: "“Lady in White”, a “Senhora de Branco”, foi a figura publicitária de qual marca da Henkel?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Persil"
          - "Schwarzkopf"
          - "Pritt"
          - "Loctite"
        resposta_correta: "Persil"
      - id: ipe-icj-008
        pergunta: "Qual o lema do aniversário de 150 anos da Henkel?"
        nivel: facil
        pontos: 5
        alternativas:
          - "Futuro? Estamos prontos!"
          - "Futuro? Estamos chegando..."
          - "A caminho do futuro."
          - "O futuro nos espera."
        resposta_correta: "Futuro? Estamos prontos!"
      - id: ipe-icj-009
        pergunta: "Qual o propósito da Henkel, inspirado pelo espírito pioneiro de seu fundador?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Pioneiros de coração pelo bem das gerações"
          - "Pioneiros na inovação para um futuro sustentável"
          - "Transformando o hoje para construir o amanhã"
          - "Inspirados pelo futuro, movidos pela inovação"
        resposta_correta: "Pioneiros de coração pelo bem das gerações"
      - id: ipe-icj-010
        pergunta: "Onde está localizado o Academy of Hair, academia de treinamentos voltados para cuidados capilares (HCB-P), no Brasil?"
        nivel: facil
        pontos: 5
        alternativas:
          - "São Paulo"
          - "Rio de Janeiro"
          - "Jundiaí"
          - "Itapevi"
        resposta_correta: "São Paulo"
      - id: ipe-icj-011
        pergunta: "Qual marca da Henkel foi atestada com “Qualidade à Prova do Espaço” em 2001?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Pritt"
          - "SuperBonder"
          - "Cascorez"
          - "Schwarzkopf"
        resposta_correta: "Pritt"
