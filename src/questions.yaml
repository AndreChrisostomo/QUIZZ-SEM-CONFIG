        pergunta: "Qual monumento histórico foi apoiado pela Henkel em um projeto de restauração em 1987?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "Grande Muralha da China"
          - "Coliseu de Roma"
          - "Torre Eiffel"
          - "As Pirâmides de Gizé"
        resposta_correta: "Grande Muralha da China"
      - id: ipe-icj-013
        pergunta: "Qual empresa foi adquirida integralmente pela Henkel em 1997 para fortalecer seu negócio de adesivos?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Loctite"
          - "Cascola"
          - "Pritt"
          - "Durepoxi"
        resposta_correta: "Loctite"
