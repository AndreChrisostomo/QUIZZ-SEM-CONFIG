        pergunta: "Qual tipo de produto a Henkel começou a produzir em 1922, dando origem a um novo segmento de negócios?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Adesivos"
          - "Cosméticos"
          - "Sabão líquido"
          - "Sabão em pó"
        resposta_correta: "Adesivos"
      - id: ipe-icj-015
        pergunta: "Em que ano a marca Authentic Beauty Concept foi lançada no mercado brasileiro?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "2020"
          - "2013"
          - "2025"
          - "2004"
        resposta_correta: "2020"
      - id: ipe-icj-016
        pergunta: "Além de Düsseldorf e Jundiaí, onde está localizado outro Inspiration Center da Henkel?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Xangai"
          - "Mumbai"
          - "Dubai"
          - "Barcelona"
        resposta_correta: "Xangai"
      - id: ipe-icj-017
        pergunta: "Qual artefato histórico foi restaurado em 2015 com o apoio de tecnologias adesivas da Henkel?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "A máscara de Tutancâmon"
          - "A pedra de Roseta"
          - "O sarcófago de Ramsés II"
          - "A moldura da Mona Lisa"
        resposta_correta: "A máscara de Tutancâmon"
      - id: ipe-icj-018
        pergunta: "Qual país foi escolhido para sediar a primeira filial da Henkel na América Latina?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Brasil"
          - "México"
          - "Peru"
          - "Colômbia"
        resposta_correta: "Brasil"
      - id: ipe-icj-019
        pergunta: "Onde estava localizada a primeira fábrica da Henkel no Brasil?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Jacareí"
          - "Campinas"
          - "Boituva"
          - "Suzano"
        resposta_correta: "Jacareí"
      - id: ipe-icj-020
        pergunta: "Qual é o principal compromisso climático da Henkel para 2045?"
        nivel: medio
        pontos: 10
        alternativas:
          - "Atingir zero emissões líquidas de gases de efeito estufa"
          - "Alcançar uma redução de 29% nas emissões totais"
          - "Aumentar o percentual de uso de energia renovável para 97%"
          - "Não há uma meta definida"
        resposta_correta: "Atingir zero emissões líquidas de gases de efeito estufa"
      - id: ipe-icj-021
        pergunta: "Qual é o piloto brasileiro da Stock Car patrocinado pela Henkel que utiliza produtos Loctite e Teroson em seu carro?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "Bruno Baptista"
          - "Felipe Fraga"
          - "Gabriel Casagrande"
          - "Átila Abreu"
        resposta_correta: "Bruno Baptista"
      - id: ipe-icj-022
        pergunta: "Em que década a cola Pritt foi introduzida no mercado brasileiro?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "1970"
          - "1980"
          - "1990"
          - "1960"
        resposta_correta: "1970"
      - id: ipe-icj-023
        pergunta: "Em que cidade da Alemanha a Henkel foi fundada?"
        nivel: dificil
        pontos: 15
        alternativas:
          - "Aachen"
          - "Düsseldorf"
          - "Berlim"
          - "Hamburgo"
